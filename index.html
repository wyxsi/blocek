<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rozdeľovač bločkov</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        h1 { text-align: center; margin-bottom: 20px; }
        .upload-section { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .item { display: flex; align-items: center; padding: 10px; background: white; margin-bottom: 8px; border-radius: 8px; gap: 10px; }
        .item-name { flex: 3; font-weight: 500; }
        .item-price { flex: 1; text-align: right; color: #666; }
        .item-select { flex: 2; }
        select { padding: 8px; border-radius: 5px; border: 1px solid #ddd; width: 100%; }
        .results { display: flex; gap: 20px; margin-top: 20px; }
        .result-box { flex: 1; background: white; padding: 20px; border-radius: 10px; text-align: center; }
        .result-box h2 { font-size: 2em; color: #2196F3; }
        .total { text-align: center; margin-top: 20px; color: #666; }
        button { background: #4CAF50; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #45a049; }
        .empty { text-align: center; color: #999; padding: 40px; }
    </style>
</head>
<body>
    <h1>🧾 Rozdeľovač bločkov</h1>
    
    <div class="upload-section">
        <input type="file" id="fileInput" accept=".pdf" />
        <button onclick="processPDF()">Extrahovať položky</button>
    </div>

    <div id="items"></div>
    
    <div class="results" id="results" style="display:none;">
        <div class="result-box">
            <h3>👤 Osoba 1</h3>
            <h2 id="sum1">0.00 €</h2>
        </div>
        <div class="result-box">
            <h3>👤 Osoba 2</h3>
            <h2 id="sum2">0.00 €</h2>
        </div>
    </div>
    
    <div class="total" id="total"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let items = [];
        let assigned = {};

        async function processPDF() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files[0]) { alert('Vyberte PDF súbor'); return; }
            
            const file = fileInput.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            
            items = [];
            assigned = {};
            let allText = '';
            
            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                const page = await pdf.getPage(pageNum);
                const textContent = await page.getTextContent();
                // Sort by Y position (top to bottom), then X (left to right)
                const sortedItems = textContent.items.sort((a, b) => {
                    if (Math.abs(a.transform[5] - b.transform[5]) > 5) {
                        return b.transform[5] - a.transform[5]; // Y descending
                    }
                    return a.transform[4] - b.transform[4]; // X ascending
                });
                const text = sortedItems.map(item => item.str).join('\n');
                allText += text + '\n';
            }
            
            console.log('Extracted text:', allText.substring(0, 3000));
            console.log('Text length:', allText.length);
            extractItems(allText);
            
            renderItems();
        }

        function extractItems(text) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const seen = new Set();
            
            console.log('Lines:', lines.slice(0, 30));
            
            // Find lines with "X.XX ks * X.XX" or "X.XX ks * -X.XX" pattern
            const qtyPattern = /^(\d+[.,]?\d*)\s*ks\s*\*\s*([+-]?\d+[.,]?\d*)$/;
            
            for (let i = 0; i < lines.length; i++) {
                const currLine = lines[i];
                
                const match = currLine.match(qtyPattern);
                if (!match) continue;
                
                const qty = parseFloat(match[1].replace(',', '.'));
                const unitPrice = parseFloat(match[2].replace(',', '.'));
                const totalPrice = qty * unitPrice;
                
                if (totalPrice === 0) continue;
                
                // Look back for product name
                let name = null;
                for (let j = i - 1; j >= 0 && j >= i - 5; j--) {
                    const checkLine = lines[j];
                    
                    // Skip if contains price or DPH
                    if (checkLine.includes('€') || checkLine.includes('%')) continue;
                    // Skip quantity lines
                    if (checkLine.includes('ks') || checkLine.includes('*')) continue;
                    // Skip footer keywords
                    if (checkLine.includes('SPOLU') || checkLine.includes('NA ÚHRADU') || 
                        checkLine.includes('DPH') || checkLine.includes('Sadzba') ||
                        checkLine.includes('Základ') || checkLine.includes('Elektronická') ||
                        checkLine.includes('Položky') || checkLine.includes('Číslo dokladu')) continue;
                    // Skip short lines
                    if (checkLine.length < 2) continue;
                    
                    name = checkLine;
                    break;
                }
                
                if (!name) continue;
                
                const key = name + '|' + totalPrice.toFixed(2);
                if (!seen.has(key)) {
                    seen.add(key);
                    items.push({ name: name, price: totalPrice, qty: qty });
                    assigned[items.length - 1] = 'none';
                    console.log('Found:', name, totalPrice, 'x', qty);
                }
            }
            
            console.log('Total items:', items.length);
            
            // Extract NA UHRADU total for comparison
            let pdfTotal = null;
            const naUhraduMatch = text.match(/NA\s*ÚHRADU\s*EUR?\s*(\d+[.,]?\d*)/i) || text.match(/NA\s*UHRADU\s*EUR?\s*(\d+[.,]?\d*)/i);
            if (naUhraduMatch) {
                pdfTotal = parseFloat(naUhraduMatch[1].replace(',', '.'));
                console.log('NA UHRADU:', pdfTotal);
                const extractedTotal = items.reduce((sum, item) => sum + item.price, 0);
                console.log('Extracted total:', extractedTotal);
                sessionStorage.setItem('pdfTotal', pdfTotal);
            }
        }
        
        function renderItems() {
            const container = document.getElementById('items');
            if (items.length === 0) {
                container.innerHTML = '<div class="empty">Nenájdené žiadne položky</div>';
                return;
            }
            
            container.innerHTML = items.map((item, i) => `
                <div class="item">
                    <div class="item-name">${item.qty > 1 ? '(' + item.qty + ') ' : ''}${item.name}</div>
                    <div class="item-price">${item.price.toFixed(2)} €</div>
                    <div class="item-select">
                        <select onchange="assign(${i}, this.value)">
                            <option value="none" ${assigned[i] === 'none' ? 'selected' : ''}>❌</option>
                            <option value="person1" ${assigned[i] === 'person1' ? 'selected' : ''}>👤 Osoba 1</option>
                            <option value="person2" ${assigned[i] === 'person2' ? 'selected' : ''}>👤 Osoba 2</option>
                            <option value="split" ${assigned[i] === 'split' ? 'selected' : ''}>½ Oba</option>
                        </select>
                    </div>
                </div>
            `).join('');
            
            calculateTotals();
        }

        function assign(index, value) {
            assigned[index] = value;
            calculateTotals();
        }

        function calculateTotals() {
            let total1 = 0, total2 = 0;
            const total = items.reduce((sum, item) => sum + item.price, 0);
            const pdfTotal = sessionStorage.getItem('pdfTotal');
            
            items.forEach((item, i) => {
                if (assigned[i] === 'person1') total1 += item.price;
                else if (assigned[i] === 'person2') total2 += item.price;
                else if (assigned[i] === 'split') { total1 += item.price / 2; total2 += item.price / 2; }
            });
            
            document.getElementById('results').style.display = 'flex';
            document.getElementById('sum1').textContent = total1.toFixed(2) + ' €';
            document.getElementById('sum2').textContent = total2.toFixed(2) + ' €';
            
            let totalText = 'Celkom: ' + total.toFixed(2) + ' €';
            if (pdfTotal) {
                const diff = total - parseFloat(pdfTotal);
                if (Math.abs(diff) > 0.01) {
                    totalText += ' (PDF: ' + parseFloat(pdfTotal).toFixed(2) + ' € - rozdiel: ' + diff.toFixed(2) + ' €)';
                } else {
                    totalText += ' ✓';
                }
            }
            document.getElementById('total').textContent = totalText;
        }
    </script>
</body>
</html>
