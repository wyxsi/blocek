<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RozdeÄľovaÄŤ bloÄŤkov</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        h1 { text-align: center; margin-bottom: 20px; }
        .upload-section { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .item { display: flex; align-items: center; padding: 10px; background: white; margin-bottom: 8px; border-radius: 8px; gap: 10px; }
        .item-name { flex: 3; font-weight: 500; }
        .item-price { flex: 1; text-align: right; color: #666; }
        .item-select { flex: 2; }
        select { padding: 8px; border-radius: 5px; border: 1px solid #ddd; width: 100%; }
        .results { display: flex; gap: 20px; margin-top: 20px; }
        .result-box { flex: 1; background: white; padding: 20px; border-radius: 10px; text-align: center; }
        .result-box h2 { font-size: 2em; color: #2196F3; }
        .total { text-align: center; margin-top: 20px; color: #666; }
        button { background: #4CAF50; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #45a049; }
        .empty { text-align: center; color: #999; padding: 40px; }
    </style>
</head>
<body>
    <h1>đź§ľ RozdeÄľovaÄŤ bloÄŤkov</h1>
    
    <div class="upload-section">
        <input type="file" id="fileInput" accept=".pdf" />
        <button onclick="processPDF()">ExtrahovaĹĄ poloĹľky</button>
    </div>

    <div id="items"></div>
    
    <div class="results" id="results" style="display:none;">
        <div class="result-box">
            <h3>đź‘¤ Osoba 1</h3>
            <h2 id="sum1">0.00 â‚¬</h2>
        </div>
        <div class="result-box">
            <h3>đź‘¤ Osoba 2</h3>
            <h2 id="sum2">0.00 â‚¬</h2>
        </div>
    </div>
    
    <div class="total" id="total"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let items = [];
        let assigned = {};

        async function processPDF() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files[0]) { alert('Vyberte PDF sĂşbor'); return; }
            
            const file = fileInput.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            
            items = [];
            assigned = {};
            
            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                const page = await pdf.getPage(pageNum);
                const textContent = await page.getTextContent();
                const text = textContent.items.map(item => item.str).join('\n');
                extractItems(text);
            }
            
            renderItems();
        }

        function extractItems(text) {
            const lines = text.split('\n');
            const seen = new Set();
            
            for (let i = 0; i < lines.length - 1; i++) {
                const currentLine = lines[i].trim();
                const nextLine = lines[i + 1].trim();
                
                // Pattern: name + "X.X% X.XXâ‚¬"
                const match = nextLine.match(/^(\d+\.\d+)%\s*(\d+\.\d+)â‚¬$/);
                if (match && currentLine && !currentLine.includes('%') && !nextLine.includes('ks') && !nextLine.includes('-')) {
                    const price = parseFloat(match[2]);
                    const key = currentLine + '|' + price;
                    if (price > 0 && !seen.has(key)) {
                        seen.add(key);
                        items.push({ name: currentLine, price: price });
                        assigned[items.length - 1] = 'none';
                    }
                }
                
                // Pattern: just price without DPH% (like "2.34â‚¬")
                const simpleMatch = nextLine.match(/^(\d+\.\d+)â‚¬$/);
                if (simpleMatch && currentLine && !currentLine.includes('%') && !nextLine.includes('ks') && !nextLine.includes('*')) {
                    const price = parseFloat(simpleMatch[1]);
                    const key = currentLine + '|' + price;
                    if (price > 0 && !seen.has(key)) {
                        seen.add(key);
                        items.push({ name: currentLine, price: price });
                        assigned[items.length - 1] = 'none';
                    }
                }
            }
            
            // Debug: show what was extracted
            console.log('Extracted items:', items);
        }

        function renderItems() {
            const container = document.getElementById('items');
            if (items.length === 0) {
                container.innerHTML = '<div class="empty">NenĂˇjdenĂ© Ĺľiadne poloĹľky</div>';
                return;
            }
            
            container.innerHTML = items.map((item, i) => `
                <div class="item">
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">${item.price.toFixed(2)} â‚¬</div>
                    <div class="item-select">
                        <select onchange="assign(${i}, this.value)">
                            <option value="none" ${assigned[i] === 'none' ? 'selected' : ''}>âťŚ</option>
                            <option value="person1" ${assigned[i] === 'person1' ? 'selected' : ''}>đź‘¤ Osoba 1</option>
                            <option value="person2" ${assigned[i] === 'person2' ? 'selected' : ''}>đź‘¤ Osoba 2</option>
                            <option value="split" ${assigned[i] === 'split' ? 'selected' : ''}>Â˝ Oba</option>
                        </select>
                    </div>
                </div>
            `).join('');
            
            calculateTotals();
        }

        function assign(index, value) {
            assigned[index] = value;
            calculateTotals();
        }

        function calculateTotals() {
            let total1 = 0, total2 = 0;
            const total = items.reduce((sum, item) => sum + item.price, 0);
            
            items.forEach((item, i) => {
                if (assigned[i] === 'person1') total1 += item.price;
                else if (assigned[i] === 'person2') total2 += item.price;
                else if (assigned[i] === 'split') { total1 += item.price / 2; total2 += item.price / 2; }
            });
            
            document.getElementById('results').style.display = 'flex';
            document.getElementById('sum1').textContent = total1.toFixed(2) + ' â‚¬';
            document.getElementById('sum2').textContent = total2.toFixed(2) + ' â‚¬';
            document.getElementById('total').textContent = 'Celkom: ' + total.toFixed(2) + ' â‚¬';
        }
    </script>
</body>
</html>
